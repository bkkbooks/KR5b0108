front:
  text: 上清明堂元眞經訣遜六白玉龜臺九靈太眞元君西王母授說明堂玄真經曰大上玄玄二氣洞明玄眞内映明堂外清吞息二暉長生神精上補司命監御萬靈六華充溢徹見黄寧此四十字即玄眞之本經也其後皆王母緫眞更演說行事之法耳猶如九眞中經唯以龍爲主耳凡四十字太上刻於鳯臺南軒也非緫眞弟子而不教非司命之挺而不傳矣玄挺録名應得主司命録者皆先受行此道楊君爲吳越神司長史當封收𢝆邑故並得受之不必皆緫眞弟子此當蓋㑹事奬誘之言耳玄眞法玉女有太玄上玄之號而字玄眞故名爲玄眞所謂内映者矣又是眞玄之上法故東卿云此眞玄之道要而不煩也存日月在口中按此初服玉女津液日月形來入於口止芒霞來注至後還明堂中方使從口入而上昇也若不存此玉女事宜用後單行訣者初便存日月大如鐶在口中耳白日存日夜半存月亦可存無晝夜以分别於日月也亦可晝夜互兼存之凡諸日月之道例皆不爾自不及分爲昏明兩法也此云白日存日則通呼一晝夜半存月則通呼一夜非謂正午子時矣故後訣云晝存日夜存月也今若日夜止一過存者當用日月初出之時通隨實書事後便存之若欲數存者日夜各三過爲節畫則向日夜則向月並平坐瞑目接手爲之天隂止寢室月不見時亦向其所在日色赤月色黄日有紫光九芒月有白光十芒使日月對口相去九尺光芒向口芒直如弦以入於口也初存日月在天上猶如今所見之大光色如法冉冉來下其形漸小去口九尺正圓如丸明耀洞徹云紫光九芒即九芒之紫光耳芒芒皆有光色各使如數並從日月之邊周圓分布直向我之前假令向來存日使日之東邊及上下南北之芒皆屈來并與西芒緫如東弦入我口中勿使四豦并列分散左右也又存日月中有女子頭建紫巾朱錦帔裙自稱太玄上玄丹霞玉女諱纏旋字宻眞向存日及光芒都畢乃又存見日中有一女子恭坐接手隱章長三尺許形色玉麗頭著紫華芙蓉巾絳地錦帔朱丹飛裙縁素帶正向我口跪自稱曰妾是太玄上玄丹霞玉女諱纏旋字宻眞因開口吐出赤氣也口吐赤氣彌滿日月光芒之間合與芒霞並盡入注我口按後祝云出日入月即是服月時祝而云口吐絳氣令服月時存玉女亦應吐赤氣也並各與光芒紛糺合㑹俱入我口中比此云芒霞者猶是先通冠芒外之赤光所以號丹霞玉女也雖月芒亦有之也我主咽之存女亦隨吐行之九十咽畢存覺令日月之景親簿我面上存女一吐我輒一咽三種之氣初令三十咽下命門宫次三十咽下絳宫後三十咽上泥丸宫合光流貫四體洞徹五藏於是日月之形漸漸而近光毎一咽輒行一寸至令九十數畢乃薄在口上上至鼻端下至頥下光輝洞朗殊覺炎熱玉女之形亦隨日小也令玉女之口歠我口上使氣液來下入於口中玉女常在日月中令頭口正與我口相注赤氣丹液流入脣齒未可吞之至祝竟乃更咽耳我乃微祝曰太霄紫眞明堂隂神日月生精玉女纏旋先自虛誕厥字宻眞首巾紫華芙蓉靈冠身披錦帔朱丹飛裙出日入月天光幽芬口吐絳氣灌我三元面覩天并柔魄制魂玄液流行胎精長全五藏生華開童反顏監御萬靈司命飛仙十一句内服日時恐應攺韻云出月入日也畢存玉女之口津液令注我口中猶是向者流注不絶須祝訖更使隨吐隨咽耳我又嗽液而隨咽之又九十過止此所吐津猶存赤色一吐一咽三宫次第猶如前法至乎數訖玉女舉形各隨日月入口含之良乆乃上還明堂中日時在右黄門之裏疑思注念於是都畢也靜心思感行之務多不復有限也如此則日夜無事便可爲之不必止三過也但此明數旣多兼行餘業思或相稽耳若存日則不存月若存月則不存日也此爲不得一時俱存日月也要當均存之耳此謂不得偏行一法當使日月晝夜所存之數相均等耳晝則一存日夜則一存月晝三存日夜三存月若不得服時當存二景還明堂中日左月右令日月光輝與目瞳合照四映二氣使相通注也此爲非存服之時亦當俱思日月在明堂中赤黄二景紫白光芒與兩瞳相通共照徹身面光耀九宫端生之時常思如此此一時日月俱合不復分别晝夜各存之也所以須非服時存此也若乃服時則日月不得同處矣亦可常存日月在明堂中不待常所服日月之二景而兼用之也此謂非如是向存玉女所居之日月明堂中常目有分精者耳坐卧常思髣髴如見行之五年太玄玉女將下降於子與之寢息太玄玉女亦能分形爲數十玉女任子之驅使也此積感結精化生象見精之至也感之妙應矣此太玄之號是日月所居之境玉女者亦日月夫人之女也其感化之形可共寢宴遊處耳非爲偶對之接也前歠口注液之時若頤有懷於中胷則必無降眄之由矣外内夷坦乃當髣髴其後分軀散景雖可役使而眞質故難得以附焉太元眞人初在常山學通夢見太玄玉女把玉札而攜之令往西城即是此女後果得受行玄眞明誠感之深巳致先兆也太上眞官用日霞之道挹二景之法使人通靈致眞體生玉映役命萬神上昇帝房矣太上眞官謂諸司命之例者也昔鍾山眞人教夏禹之道是此玄眞法耳但鈔畧而巳無纏旋之事也按劔經序云夏禹服靈寳行九眞又五符所載鍾山眞人教禹服日月五星之法並與今說不同此云無纒旋之事者即應是後東卿所授者初授二弟亦單法耳此傳所載於玄眞之事其理巳盡唯有陰陽二景内眞符在金當淫中未行於世也昔司命受玄眞於王母及緫眞訣教行之三年色如女子日有流光面生玉澤司命後以經存之法授二弟竭誠精思三年之中神光乃見爾乃更受纏旋之事故得爲定録保命之位矣東卿司命曰先師王君昔見授太上明堂玄眞上經清齋休粮存日月在口中晝存日夜存月令大如鐶日赤色有紫光九芒月黄色有白光十芒存咽服光芒之液常宻行之無數若不修存之時令日月還住面明堂中日居左月居右令二景與目瞳合氣相通也此道以攝運生精理和魂神六丁奉侍天兵衛護此上眞道也太上玄眞經先盟而後行行之後可聞玉珮金璫之道耳季偉昔長齋三年誠竭單思乃能得之於是神光映身然後受書耳此玄眞之道要而不煩吾常寳祕藏之囊肘故以相示可慎宻者也此即應是夏禹所受之法也司命今先授此省易之訣於楊君者欲令長史行之于時長史靈地未澄故且隱玉女之事後方便示傳記耳所謂次行玄眞者明堂玄眞自有經經亦少少耳大都口訣正如此而行之偉昔亦不得經但按此而行始乃得經耳爾欲得可就偉取玉珮隱書非偉所見耳經即傳上所載者是也云爾欲得者謂揚君可求省之耳玉珮金璫東卿所祕旣與玄眞同類俱行日月之道但又恐揚君就二君請之故及此言也夜行及㝠卧心中恐者存日月還入明堂中須㬰百邪自滅常爾爲佳此即與不存服時所存同也山居幽處思有犯試故宜常存以却之此訣眞誥别授非傳上所載既是玄眞家事故取以相從今能行玉女之道者則不復修此是以不復注釋右茅傳訣本四事今止取一事太極眞人服四極雲牙神仙上方女弟子魏華存受清虛眞人方十二字本注眞人挹五方元晨之暉食九霞之精所以神光内曜朱華外陳體生玉映形與氣明行之十年四極老人中央元君降下於子一合乗雲駕龍白日登天五方老人蓋謂五方自然之精神非世學之所爲也十年之妙何速如之實虛淡之奇道吐納之祕法也昔太極眞人西梁子奉受太上口訣千歲五傳不得妄泄四明科法依隱書之制齋五日乃授立約委歠𧵥師金鐶五方以效天人誓信不宣之劵五日之齋五方之𧵥蓋謂在世之人耳王君昔在華陰則一日頓奉明知山林則是長齋𧵥誓則是實心也西梁眞人既傳青精之方仍復授此法以其理日相資虛實兼㑹矣五𩀱爲五方者謂准五方之用耳亦或眞人呼𩀱爲方故復口訣顯之也口訣五𩀱鐸也又用青絲五兩云是西梁眞人法此本注書口訣者是矣夫人所宣王君辭也此衣朱注書者是楊君所書夫人口授也東向叩齒九通乃隂祝曰東方青牙紫雲流霞三素徘徊玄霜玉羅服食晨暉飲以朝華三韻祝畢以舌舐接上脣之外取津而咽液三十過一舐接得津輒一咽存液青色使入肝中行之十年東極老人來至授子青眞一合俱昇青眞經名也次南向先叩齒九通又隂祝曰南方朱丹霞曜太微九道絳煙散布景輝服食靈晨飲以丹池三韻祝畢以舌舐接下脣之外取津咽液三十過存液赤色使入心中此兩方並舐脣外之液故皆有接字也行之十年南極老人來至授子丹景一合上昇丹景經名也次西向先叩齒九通又陰祝曰西方明石飛霞金液服食太明素靈之精飲以玉漿神華啓靈使我登虛上昇高清四韻神或恐是晨矣祝畢以舌舐上脣之内取津咽液三十過存液白色入肺中行之十年西極老人來至授子素靈威神一合俱昇素靈威神六符名也次北向先叩齒九通又隂祝曰北方玄滋慶雲啓胎緑霞敷晨紫蓋蒼旗服食月華飲以瓊飴三韻祝畢以舌舐下脣之内取津咽液三十過存液玄色灌入兩賢中行之十年北極老人來至授子玄籙寳明一合上昇玄籙寳明經名也次向南坐仰面先叩齒九通又隂祝曰戊巳之元黄素五雲四霞紫觀八景九晨二明激暉七矅靈尊和精灌氣服食中元琳華龍胎飲以醴泉五韻祝畢以舌漱滿一口之中玄膺内外齒舌之間表裏通帀取津液隨咽之四十過此亦是漱滿一徧輒一咽之存液黄色使入脾中此四十字眞本作三十後益丁書筆迹猶似是眞此當是中央緫四方也猶鎭星門鋒之義耳行之十年中央元君上玄黄老君來降授子黄氣陽精藏天隱月遁景録章青要虎書俱與四老一合上昇此中兼有經符章三編之書也此玉經上訣致五老之道絶榖去尸面華色童寒暑不避災害無傷神仙精明延年進紀益壽一萬萬限之期當得九琳玉液八瓊飛精則合終二景天地同符此蓋專說雲牙之分耳五隂祝皆當叩齒九通可常修行不必雞鳴平旦也夜半平坐寂室體清神閑乃可按之前叩齒唯冠東方令重明方悉爾也五嶽名笥亦方方閉氣守一之家若聞此道事速成也虛淡内充守元咽液所謂眞一者也自求多福者矣致神以六液五氣氣巳自備焉故謂自求多福耳修此道極勿食脯肉若聞饑當食麪物以漸遣榖不得一日頓棄也所謂損之又損之以至於無爲矣能行此斷榖又賢乎青精矣却粒之上道也然至須靜淡無事專修積年以取益耳若兼之以雜業恐非氣力所堪自不及食相資表裏交益矣亦視人四體虛實彊羸老少之殊不得一㮣更盡用也夫人昔雖受此法叙說褒羙而竟不用之乃可是挺業高絶要亦宜准傍遥蹤矣此虛映之道自然之法所謂遠取天地之精近取諸身此之謂也雲牙者五老之精氣太極之霞煙故採暉景之鋒以充於六液之和洞徹冥感萬神來降幽映相求不唱而應是以龍吟萬淵故景雲落霄虎嘯靈丘故衝風四振陽燧招明而朱火鬱起方諸罕隂而玄流湛溢自然而然不覺所測况學者方棲心注玄精研道根穢累豁於中胷眞正存乎三宫採五晨之散暉服六醴之霞漿祝九天之竒寳吐玄妙之祕言龍躍發暉明光七煥味三華於皓齒取飽液於脣鋒内鍊六府開聦徹明呼吸天元魂魄鍊形朝玄使無以至於靈悠悠十年末乃五神來降將何足多稱哉猥以女弱備經上業微音絶響不可廣告聊叙其妙以宣同志苟修德之不逮者庶不足以咎毀之矣南嶽夫人叙也
